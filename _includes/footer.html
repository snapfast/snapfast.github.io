<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div style="display: flex; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; font-size: 15px;">
      <span class="p-name">{{ site.author.name | escape }}</span>

      <a href="{{ "/feed.xml" | relative_url }}" style="display: inline-flex; align-items: center; gap: 5px;">
        <svg class="svg-icon orange" style="width: 16px; height: 16px;"><path d="M12.8 16C12.8 8.978 7.022 3.2 0 3.2V0c8.777 0 16 7.223 16 16h-3.2zM2.194 11.61c1.21 0 2.195.985 2.195 2.196 0 1.21-.99 2.194-2.2 2.194C.98 16 0 15.017 0 13.806c0-1.21.983-2.195 2.194-2.195zM10.606 16h-3.11c0-4.113-3.383-7.497-7.496-7.497v-3.11c5.818 0 10.606 4.79 10.606 10.607z"/></svg>
        <span>Subscribe</span>
      </a>

      <div class="social-links" style="margin: 0;">
        <ul class="social-media-list" style="display: flex; list-style: none; margin: 0; padding: 0; gap: 15px;">
          {%- for link in site.minima.social_links -%}
            <li>
              <a href="{{ link.url | escape }}" target="_blank" title="{{ link.title | escape }}" rel="me noopener">
                <span class="grey fa-brands fa-{{ link.icon }} fa-lg"></span>
              </a>
            </li>
          {%- endfor -%}
        </ul>
      </div>
    </div>
  </div>
</footer>
